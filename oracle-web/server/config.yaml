check_interval: 30
alert_threshold: 0.03
bot:
  poll_interval_sec: 30
  playwright:
    start_url: "https://university.stockstotrade.com/login"
    data_page_url: "https://university.stockstotrade.com/page/oracle-tool"
    wait_for_selector: "table, [data-symbol], .ticker, .symbol, [class*='oracle']"
    symbols_selector: "[data-symbol], .ticker, .symbol, table tbody tr td:first-child"
    row_selector: "table tbody tr, [role='row']"
    symbol_selector: "[data-symbol], [class*='symbol'], td:first-child"
    target_selector: ""
    resistance_selector: ""
    login_required: true
    manual_login: true
    manual_login_timeout_sec: 600
    persist_session: true
    session_state_path: ".playwright-state/oracle-session.json"
    login_url: "https://university.stockstotrade.com/login"
    username_selector: "input[type='email'], input[name='email'], input[name='username']"
    password_selector: "input[type='password'], input[name='password']"
    submit_selector: "button[type='submit'], input[type='submit']"
    post_login_wait_selector: "a[href*='logout'], [href*='/logout']"
    username_env: "ORACLE_WEB_USERNAME"
    password_env: "ORACLE_WEB_PASSWORD"
    headless: false
    use_existing_chrome: true
    chrome_cdp_url: "http://127.0.0.1:9223"
    oracle_expected_columns:
      - "symbol"
      - "stop_loss"
      - "buy_zone"
      - "profit_delta"
      - "sell_zone"
      - "max"
      - "last"
      - "chg"
      - "volume"
      - "float"
      - "mk_cap"
    oracle_schema_strict: false
    reload_interval_minutes: 60
  floatmap:
    enabled: true
    url: "https://university.stockstotrade.com/page/Oracle-FloatMAP"
    poll_interval_sec: 120
    frame_url_contains: "amplifyapp.com"
    hydration_wait_ms: 8000
    frame_max_wait_ms: 30000
  moderatorAlerts:
    enabled: true
    urls:
      - "https://university.stockstotrade.com/room/pre-market-prep"
      - "https://university.stockstotrade.com/room/daily-market-profits"
    poll_interval_sec: 180
    hydration_wait_ms: 5000
  incomeTraderChat:
    enabled: true
    url: "https://university.stockstotrade.com/room/daily-income-trader-chat"
    poll_interval_sec: 60
    hydration_wait_ms: 5000
  alpaca_bars:
    # Alpaca free-tier IEX feed caps at ~200 req/min. 180 leaves 10%
    # headroom for clock skew and any out-of-process callers. Bump to
    # 500+ if upgraded to the SIP feed.
    rate_per_min: 180
    # Allow a short burst (e.g. cold-start price-poll cycle warming up
    # caches) before the limiter starts gating callers.
    burst: 30
  # Authors whose chat messages we ALSO try to parse as moderator alerts
  # when the body is alert-shaped (Signal:/Risk Zone:/Target:). STT-Shirley
  # posts Double Downs only in chat; without this allowlist, those alerts
  # never surface as structured mod_alert events.
  moderatorChatAllowlist:
    - "STT- Shirley"
    - "STT-Shirley"
    - "Tim Bohen"
execution:
  enabled: true
  paper: true
  risk_per_trade: 100
  max_trade_cost: 100
  max_positions: 8
  max_capital_pct: 0.50
  max_daily_drawdown_pct: 0.05
  max_risk_pct: 0.10
  red_candle_vol_mult: 1.5
  momentum_gap_pct: 0.03
  momentum_max_chase_pct: 0.05
  orb_enabled: true
  orb_range_minutes: 15
  orb_volume_mult: 1.3
  orb_max_chase_pct: 0.03
  orb_min_range_pct: 0.01
  cooldown_after_stop_ms: 86400000  # 24h — rest of the session
  require_uptrend_for_momentum: true
  wash_sale_lookback_days: 30
  wash_sale_min_score: 75
  wash_sale_min_rr: 3.0
  wash_sale_require_no_chase: true
  trailing_breakeven_r: 1.0
  trailing_start_r: 2.0
  trailing_distance_r: 1.0
  trailing_mfe_activate_r: 0.5
  trailing_mfe_giveback_pct: 0.5
  eod_flatten_time: "15:50"
  extended_hours:
    # Allow RCT entries during Alpaca's pre-market (04:00–09:30 ET) and
    # post-market (16:00–20:00 ET) sessions. Limit orders only, simple
    # (non-bracket) entries with bot-managed exits.
    enabled: true
    # Refuse new entries in the last 15 min of post-market — too little
    # time left to manage an exit before the session ends. Pre-market
    # has no equivalent buffer because RTH (with bracket OCO promotion)
    # starts immediately at 09:30.
    no_entry_buffer_minutes_before_close: 15
    # Half-size positions in ext-hours to reduce exposure to wider spreads.
    size_cap_pct: 0.5
    # 25% wider stop on ext-hours entries to absorb thin-session slippage.
    stop_buffer_pct: 0.25
  float_rotation:
    enabled: true
    score_bump_base: 10
    score_bump_prime: 5
    prime_band_min: 1.0
    prime_band_max: 3.0
    veto_rotation_max: 7.0
    max_age_seconds: 600
  sector_hotness:
    enabled: true
    top_k_sectors: 3
    score_bump: 8
    refresh_interval_seconds: 300
    max_age_seconds: 900
    lookback_minutes: 480
  regime:
    enabled: false
    score_weight: 10
    market_weight: 0.5
    sector_weight: 0.2
    ticker_weight: 0.3
    spy_trend_normalize_pct: 0.005
    vxx_roc_normalize_pct: 0.05
    sector_trend_normalize_pct: 0.01
    veto_market_spy_trend_pct: -0.01
    veto_market_vxx_roc_pct: 0.05
    veto_graveyard_min_sample: 5
    veto_exhaustion_atr_ratio: 3.0
    winrate_min_sample: 3
    atr_penalty_ratio: 2.5
    sector_etf_bars_lookback_min: 30
    trade_history_max_trades: 20
    trade_history_max_calendar_days: 30
market_hours:
  open: "09:30"
  close: "16:00"
  timezone: "America/New_York"
broker:
  active: "alpaca"
  alpaca:
    cash_account: false
  ibkr:
    # Selects which gateway profile to use when broker.active is "ibkr".
    # Both gateways can run concurrently on different ports; flip "profile"
    # and restart the backend to switch.
    profile: "paper"
    poll_session_keepalive_sec: 60
    conid_cache_path: ".ibkr-state/conid-cache-{profile}.json"
    allow_self_signed_tls: true
    profiles:
      paper:
        base_url: "https://localhost:5000/v1/api"
        # Paper account ID, e.g. "DU1234567". Per-machine, NOT committed
        # here — set IBKR_PAPER_ACCOUNT_ID in .env. The env value
        # overrides anything written below.
        account_id: ""
        cash_account: true
      live:
        base_url: "https://localhost:5001/v1/api"
        # Live account ID, e.g. "U1234567". Per-machine; set
        # IBKR_LIVE_ACCOUNT_ID in .env when going live.
        account_id: ""
        cash_account: true
recording:
  enabled: true
  dir: "F:/oracle_data/recordings"
port: 3001
